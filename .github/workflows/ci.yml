name: RL MLOps Trading CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.9
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Verify config loads
      run: python -c "import config; print('Config OK')"

    - name: Verify data pipeline imports
      run: python -c "import data_pipeline; print('Pipeline OK')"

    - name: Verify RL environment
      run: python -c "import rl_env; print('Env OK')"

    - name: Verify MLflow tracking
      run: python -c "import mlflow; print('MLflow OK')"